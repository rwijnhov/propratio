  </defs>
  <!-- Warm background -->
  <rect x="2" y="2" width="44" height="44" rx="10" fill="#faf9f7" stroke="url(#logoGrad)" stroke-width="1.5"/>
  <!-- Central chip -->
  <rect x="17" y="17" width="14" height="14" rx="3" fill="none" stroke="url(#logoGrad)" stroke-width="1.8"/>
  <rect x="20" y="20" width="8" height="8" rx="1.5" fill="url(#logoGrad)" opacity="0.15"/>
  <circle cx="24" cy="24" r="2.5" fill="url(#logoGrad)"/>
  <!-- Connections -->
  <line x1="24" y1="17" x2="24" y2="8" stroke="#c47a2a" stroke-width="1.2" opacity="0.6"/>
  <circle cx="24" cy="7" r="2" fill="#c47a2a" opacity="0.8"/>
  <line x1="24" y1="31" x2="24" y2="40" stroke="#2d6a4f" stroke-width="1.2" opacity="0.6"/>
  <circle cx="24" cy="41" r="2" fill="#2d6a4f" opacity="0.8"/>
  <line x1="17" y1="24" x2="8" y2="24" stroke="#7c5c3c" stroke-width="1.2" opacity="0.6"/>
  <circle cx="7" cy="24" r="2" fill="#7c5c3c" opacity="0.8"/>
  <line x1="31" y1="24" x2="40" y2="24" stroke="#c47a2a" stroke-width="1.2" opacity="0.6"/>
  <circle cx="41" cy="24" r="2" fill="#c47a2a" opacity="0.8"/>
  <!-- Diagonals -->
  <line x1="18.5" y1="18.5" x2="11" y2="11" stroke="#c47a2a" stroke-width="0.8" opacity="0.35"/>
  <circle cx="10" cy="10" r="1.5" fill="#c47a2a" opacity="0.5"/>
  <line x1="29.5" y1="18.5" x2="37" y2="11" stroke="#2d6a4f" stroke-width="0.8" opacity="0.35"/>
  <circle cx="38" cy="10" r="1.5" fill="#2d6a4f" opacity="0.5"/>
  <line x1="18.5" y1="29.5" x2="11" y2="37" stroke="#2d6a4f" stroke-width="0.8" opacity="0.35"/>
  <circle cx="10" cy="38" r="1.5" fill="#2d6a4f" opacity="0.5"/>
  <line x1="29.5" y1="29.5" x2="37" y2="37" stroke="#7c5c3c" stroke-width="0.8" opacity="0.35"/>
  <circle cx="38" cy="38" r="1.5" fill="#7c5c3c" opacity="0.5"/>
